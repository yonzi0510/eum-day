<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day:음 — 장기요양 AI 문서 자동화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','맑은 고딕',sans-serif;background:#F5F6FA;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:400px}

/* 로고 */
.logo-area{text-align:center;margin-bottom:32px}
.logo{font-size:28px;font-weight:700;color:#1F3864;letter-spacing:2px}
.logo-sub{font-size:12px;color:#888;margin-top:6px;letter-spacing:.5px}

/* 카드 */
.card{background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #E0E6F0}
.card-title{font-size:15px;font-weight:700;color:#1F3864;margin-bottom:4px}
.card-sub{font-size:12px;color:#888;margin-bottom:24px}

/* 입력 */
.input-label{font-size:12px;font-weight:600;color:#555;margin-bottom:6px}
.input-field{width:100%;padding:12px 14px;border:1.5px solid #C5CAE9;border-radius:10px;font-size:14px;font-family:inherit;color:#333;outline:none;transition:border .2s;margin-bottom:12px;letter-spacing:2px;text-align:center}
.input-field:focus{border-color:#1F3864}
.error-msg{font-size:12px;color:#E24B4A;margin-bottom:12px;display:none;text-align:center}

/* 버튼 */
.btn{width:100%;padding:13px;background:#1F3864;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;letter-spacing:.5px}
.btn:hover{background:#162a4e}
.btn:active{background:#0f1e37}

/* 안내 */
.notice{margin-top:20px;background:#EEF2FF;border-radius:10px;padding:12px 14px;font-size:11.5px;color:#3949AB;line-height:1.8}

/* 하단 */
.footer{text-align:center;margin-top:24px;font-size:11px;color:#bbb;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">

  <!-- 로고 -->
  <div class="logo-area">
    <div class="logo">Day:음</div>
    <div class="logo-sub">하루의 기록이 문서를 만듭니다</div>
  </div>

  <!-- 로그인 카드 -->
  <div class="card">
    <div class="card-title">접속코드 입력</div>
    <div class="card-sub">기관에서 발급받은 접속코드를 입력해주세요.</div>

    <div class="input-label">접속코드</div>
    <input type="password" id="code-input" class="input-field" placeholder="접속코드 4자리"
      maxlength="10"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <div class="error-msg" id="error-msg">접속코드가 올바르지 않습니다.</div>

    <button class="btn" onclick="tryLogin()">입장하기</button>

    <div class="notice">
      📌 접속코드를 모르시면 담당자에게 문의해주세요.<br>
      🔒 입력하신 코드는 암호화되어 저장됩니다.
    </div>
  </div>

  <div class="footer">
    Day:음 · 저작권 등록 완료 (한국저작권위원회)<br>
    © 2026 Day:음. All rights reserved.
  </div>

</div>

<script>
const CENTERS = {
  sapgyo:  { name: '삽교주간보호센터',    key: '0101', expires: '2026-12-31' },
  center2: { name: '덕산주간보호센터',    key: '0202', expires: '2026-12-31' },
  center3: { name: '내포소망주간보호센터', key: '0303', expires: '2026-12-31' },
};

// 이미 로그인된 경우 바로 app으로
(function() {
  const today = new Date().toISOString().slice(0,10);
  for (const code of Object.keys(CENTERS)) {
    const cfg = CENTERS[code];
    if (sessionStorage.getItem('ium-auth-' + code) === cfg.key && today <= cfg.expires) {
      location.replace('app.html?center=' + code);
      return;
    }
  }
})();

function tryLogin() {
  const input = document.getElementById('code-input').value.trim();
  const today = new Date().toISOString().slice(0,10);
  const errEl = document.getElementById('error-msg');

  for (const [code, cfg] of Object.entries(CENTERS)) {
    if (input === cfg.key) {
      if (today > cfg.expires) {
        errEl.textContent = `이용 기간이 만료되었습니다 (${cfg.expires}). 담당자에게 문의해주세요.`;
        errEl.style.display = 'block';
        return;
      }
      sessionStorage.setItem('ium-auth-' + code, cfg.key);
      sessionStorage.setItem('ium-center', code);
      location.replace('app.html?center=' + code);
      return;
    }
  }

  errEl.textContent = '접속코드가 올바르지 않습니다.';
  errEl.style.display = 'block';
  document.getElementById('code-input').value = '';
  document.getElementById('code-input').focus();
}
</script>
</body>
</html>
