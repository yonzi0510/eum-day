<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day:음 — 로그인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:13px;
  background:linear-gradient(135deg,#1F3864 0%,#16305a 50%,#0D6E55 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-card{
  background:#fff;
  border-radius:20px;
  padding:40px 36px 36px;
  max-width:380px;
  width:100%;
  box-shadow:0 16px 48px rgba(0,0,0,0.25);
  text-align:center;
}
.logo-wrap{margin-bottom:8px}
.tagline{font-size:12px;color:#aaa;margin-bottom:28px}
.login-title{font-size:15px;font-weight:600;color:#1F3864;margin-bottom:6px}
.login-desc{font-size:12px;color:#888;margin-bottom:20px;line-height:1.6}
.code-input{
  width:100%;
  padding:13px 16px;
  border:1.5px solid #C5CAE9;
  border-radius:10px;
  font-size:16px;
  font-family:inherit;
  text-align:center;
  letter-spacing:4px;
  margin-bottom:10px;
  outline:none;
  transition:border-color .2s;
  color:#1F3864;
  font-weight:600;
}
.code-input:focus{border-color:#1F3864}
.err-msg{
  font-size:12px;
  color:#E24B4A;
  margin-bottom:10px;
  display:none;
  text-align:center;
}
.login-btn{
  width:100%;
  padding:13px;
  background:#1F3864;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
  letter-spacing:.5px;
}
.login-btn:hover{background:#16305a}
.login-btn:active{transform:scale(.98)}
.hint{margin-top:16px;font-size:11px;color:#bbb;line-height:1.7}
.divider{height:1px;background:#F0F2F7;margin:24px 0}
.copy{font-size:11px;color:#ccc}
</style>
</head>
<body>

<div class="login-card">

  <!-- 로고 -->
  <div class="logo-wrap">
    <svg width="120" height="36" viewBox="0 0 140 36" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1F3864"/>
          <stop offset="100%" style="stop-color:#3a5f9e"/>
        </linearGradient>
        <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#5de8c0"/>
          <stop offset="100%" style="stop-color:#1D9E75"/>
        </linearGradient>
      </defs>
      <path d="M5 18 A8 8 0 0 1 13 10 A8 8 0 0 0 21 18" stroke="url(#lg1)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M21 18 A8 8 0 0 1 13 26 A8 8 0 0 0 5 18" stroke="url(#lg2)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="5" cy="18" r="3.5" fill="#1F3864"/>
      <circle cx="21" cy="18" r="3.5" fill="#1D9E75"/>
      <text x="30" y="25" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="22" font-weight="800" fill="#1F3864" letter-spacing="-1">Day:음</text>
    </svg>
  </div>
  <div class="tagline">하루의 기록이 문서를 만듭니다</div>

  <div class="login-title">접속코드를 입력해주세요</div>
  <div class="login-desc">센터별 접속코드를 입력하면<br>자동으로 연결됩니다</div>

  <input
    id="code-input"
    class="code-input"
    type="password"
    placeholder="접속코드"
    autocomplete="off"
    onkeydown="if(event.key==='Enter') doLogin()"
  >
  <div class="err-msg" id="err-msg">❌ 접속코드가 올바르지 않습니다</div>
  <button class="login-btn" onclick="doLogin()">입장하기</button>

  <div class="hint">접속코드는 담당자에게 문의해주세요</div>

  <div class="divider"></div>
  <div class="copy">© 2026 Day:음 · 저작권 등록 완료</div>
</div>

<script>
// ────── 센터 정의 (app.html / app-homecare.html과 동일하게 유지) ──────
const CENTERS = {
  sapgyo:  { name: '삽교주간보호센터',   short: '삽교',   color: '#1F3864', key: '0101', expires: '2026-12-31', pilot: true, type: 'daycenter' },
  center2: { name: '덕산주간보호센터',   short: '덕산',   color: '#0D6E55', key: '0202', expires: '2026-12-31', pilot: true, type: 'daycenter' },
  center3: { name: '내포소망주간보호센터', short: '내포소망', color: '#5C3489', key: '0303', expires: '2026-12-31', pilot: true, type: 'daycenter' },
  // 방문요양 테스트 센터 추가 시 아래에 입력
  // homecare1: { name: '○○방문요양센터', short: '○○', color: '#1F3864', key: '1101', expires: '2026-12-31', pilot: true, type: 'homecare' },
};

// 이미 인증된 세션이면 바로 이동
(function() {
  const today = new Date().toISOString().slice(0,10);
  for (const [code, cfg] of Object.entries(CENTERS)) {
    if (sessionStorage.getItem('ium-auth-' + code) === cfg.key && today <= cfg.expires) {
      redirectByType(code, cfg.type);
      return;
    }
  }
})();

function doLogin() {
  const input = document.getElementById('code-input').value.trim();
  const errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';

  if (!input) return;

  const matched = Object.entries(CENTERS).find(([code, cfg]) => input === cfg.key);
  if (!matched) {
    errEl.style.display = 'block';
    document.getElementById('code-input').value = '';
    document.getElementById('code-input').focus();
    return;
  }

  const [code, cfg] = matched;
  const today = new Date().toISOString().slice(0,10);

  if (today > cfg.expires) {
    errEl.textContent = `테스트 기간이 종료되었습니다. (${cfg.expires}) 담당자에게 문의해주세요.`;
    errEl.style.display = 'block';
    return;
  }

  // 인증 저장
  sessionStorage.setItem(`ium-auth-${code}`, input);
  sessionStorage.setItem('ium-center', code);

  // 타입에 따라 분기
  redirectByType(code, cfg.type);
}

function redirectByType(code, type) {
  const urlParams = new URLSearchParams(window.location.search);
  const centerParam = `?center=${code}`;

  if (type === 'homecare') {
    location.replace('app-homecare.html' + centerParam);
  } else {
    // daycenter (기본)
    location.replace('app.html' + centerParam);
  }
}

// 포커스
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('code-input')?.focus();
});
</script>
</body>
</html>
